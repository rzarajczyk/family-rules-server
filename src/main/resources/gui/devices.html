<!DOCTYPE html>
<html>
<head>
    <!--Import Google Icon Font-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!--Import materialize.css-->

    <link type="text/css" rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@materializecss/materialize@2.1.1/dist/css/materialize.min.css"
          media="screen,projection"/>
    <link type="text/css" rel="stylesheet" href="theme.css" media="screen,projection"/>
    <link type="text/css" rel="stylesheet" href="common.css" media="screen,projection"/>
    <link type="text/css" rel="stylesheet" href="fr-row.css" media="screen,projection"/>
    <link type="text/css" rel="stylesheet" href="components.css" media="screen,projection"/>
    <style>
        .input-field {
            margin-top: 2em;
        }
        .instance-report {
            margin-top: 0.5em;
            margin-bottom: 2em;
        }

        .collapsible-header::after {
            display: none;
        }

        .collection-item svg.circle {
            border-radius: 0;
        }

        .explanation {
            margin-top: 4rem;
            font-style: italic;
        }

        .edit-instance-data .image-icon {
            float: left;
        }

        .edit-instance-data .file-field {
            float: left;
            clear: none;
            margin-top: 12px;
        }

        .edit-instance-data .remove-icon-container {
            float: left;
            margin-top: 12px;
            margin-right: 1em;
        }

        .edit-instance-data .remove-icon-container button {
            height: 42px;
        }

        .edit-instance-data .file-path-wrapper {
            margin-top: -10px;
        }

        .edit-instance-data .fake-label {
            font-size: 12px;
            margin-left: 12px;
            margin-top: 48px;
        }

        .edit-instance-data .dropdown-trigger {
            color: black !important;
        }
    </style>
    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <link rel="icon" type="image/png" href="icon.png">
    <title>Family Rules - Devices</title>

</head>
<body>
<header data-source="./header.handlebars"></header>

<div class="container">
    <div class="row">
        <div class="col s12">
            <form>
                <div class="input-field">
                    <input id="datepicker" type="text" class="datepicker no-autoinit">
                    <label for="datepicker">Date</label>
                </div>
            </form>
        </div>
    </div>
    <div id="loading"></div>

    <div class="row">
        <div class="col s12">
            <ul class="collapsible no-autoinit popout" id="instances" style="display: none;">
            </ul>
        </div>
    </div>
</div>

<div id="instance-state-modal" class="modal modal-fixed-footer">
    <div class="modal-content"></div>
    <div class="modal-footer">
        <a href="#!" class="modal-close waves-effect btn-flat">Cancel</a>
    </div>
</div>

<div id="instance-info-modal" class="modal modal-fixed-footer">
    <div class="modal-content"></div>
    <div class="modal-footer">
        <a href="#!" class="modal-close waves-effect btn-flat">Close</a>
    </div>
</div>

<div id="instance-edit-modal" class="modal modal-fixed-footer">
    <div class="modal-content"></div>
    <div class="modal-footer">
        <a href="#!" class="modal-close waves-effect btn-flat">Cancel</a>
        <a href="#!" class="waves-effect btn-flat" id="instance-edit-save">Save</a>
    </div>
</div>

<div id="usage-histogram-modal" class="modal modal-fixed-footer">
    <div class="modal-content">
        <h4 id="usage-histogram-title">Screen Time Usage</h4>
        <div style="overflow-x: auto; width: 100%;">
            <div style="position: relative; height: 400px; min-width: 1200px;">
                <canvas id="histogram-chart"></canvas>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <a href="#!" class="modal-close waves-effect btn-flat">Close</a>
    </div>
</div>

<!--JavaScript at end of body for optimized loading-->
<script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@materializecss/materialize@2.1.0/dist/js/materialize.js"></script>
<script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>
<script src="components.js"></script>
<script src="common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="devices.js"></script>

</body>
</html>
